apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "storage.fullname" . }}-config
  labels:
    {{- include "storage.labels" . | nindent 4 }}
data:
  config.json: |-
    {
      "nodePathMap": [
        {
          "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["{{ .Values.config.defaultPath }}"]
        }
      ]
    }
  setup: |-
    #!/bin/sh
    set -eu
    mkdir -m 0777 -p "$VOL_DIR"
  teardown: |-
    #!/bin/sh
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |-
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: helper-pod
          image: {{ .Values.helperPod.image.repository }}:{{ .Values.helperPod.image.tag }}
          imagePullPolicy: {{ .Values.helperPod.image.pullPolicy }}

