{{- if .Values.routes.palengkeBackend.stripPrefix.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "networking.fullname" . }}-palengke-backend-stripprefix
  labels:
    {{- include "networking.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      {{- range .Values.routes.palengkeBackend.stripPrefix.prefixes }}
      - {{ . | quote }}
      {{- end }}
{{- end }}
