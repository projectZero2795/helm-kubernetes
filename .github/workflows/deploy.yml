name: Homelab Helm Deploy

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy_all:
        description: Deploy all functions even if no chart changes are detected
        required: false
        type: boolean
        default: false
      deploy_storage:
        description: Manually deploy storage even if no changes are detected
        required: false
        type: boolean
        default: false
      deploy_monitoring:
        description: Manually deploy monitoring even if no changes are detected
        required: false
        type: boolean
        default: false
      deploy_networking:
        description: Manually deploy networking even if no changes are detected
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      force_deploy_all:
        required: false
        type: boolean
        default: false
      deploy_storage:
        required: false
        type: boolean
        default: false
      deploy_monitoring:
        required: false
        type: boolean
        default: false
      deploy_networking:
        required: false
        type: boolean
        default: false
      event_before:
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: homelab-helm-production
  cancel-in-progress: false

env:
  DEPLOY_HOST: 10.11.11.31
  DEPLOY_PORT: "22"
  DEPLOY_USER: root

jobs:
  validate:
    name: Validate ${{ matrix.target }}
    runs-on:
      - self-hosted
      - linux
    strategy:
      fail-fast: false
      matrix:
        target:
          - storage
          - monitoring
          - networking
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/helm.sh deps "${{ matrix.target }}"
          ./scripts/helm.sh lint "${{ matrix.target }}"
          ./scripts/helm.sh template "${{ matrix.target }}"

  detect_changes:
    name: Detect Deployment Changes
    if: github.event_name != 'pull_request'
    runs-on:
      - self-hosted
      - linux
    outputs:
      storage: ${{ steps.detect.outputs.storage }}
      monitoring: ${{ steps.detect.outputs.monitoring }}
      networking: ${{ steps.detect.outputs.networking }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed functions
        id: detect
        shell: bash
        env:
          EVENT_BEFORE: ${{ inputs.event_before || github.event.before }}
          FORCE_DEPLOY_ALL: ${{ inputs.force_deploy_all || 'false' }}
          MANUAL_DEPLOY_STORAGE: ${{ inputs.deploy_storage || 'false' }}
          MANUAL_DEPLOY_MONITORING: ${{ inputs.deploy_monitoring || 'false' }}
          MANUAL_DEPLOY_NETWORKING: ${{ inputs.deploy_networking || 'false' }}
        run: |
          set -euo pipefail

          storage=false
          monitoring=false
          networking=false

          if [[ "${FORCE_DEPLOY_ALL}" == "true" ]]; then
            storage=true
            monitoring=true
            networking=true
          else
            changed_files=""

            if [[ -n "${EVENT_BEFORE}" && ! "${EVENT_BEFORE}" =~ ^0+$ ]]; then
              changed_files="$(git diff --name-only "${EVENT_BEFORE}" "${GITHUB_SHA}")"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              changed_files="$(git diff --name-only HEAD^ HEAD)"
            else
              storage=true
              monitoring=true
              networking=true
            fi

            if [[ -n "${changed_files}" ]]; then
              while IFS= read -r file; do
                case "${file}" in
                  functions/storage/*)
                    storage=true
                    ;;
                  functions/monitoring/*)
                    monitoring=true
                    ;;
                  functions/networking/*)
                    networking=true
                    ;;
                esac
              done <<< "${changed_files}"
            fi
          fi

          if [[ "${MANUAL_DEPLOY_STORAGE}" == "true" ]]; then
            storage=true
          fi

          if [[ "${MANUAL_DEPLOY_MONITORING}" == "true" ]]; then
            monitoring=true
          fi

          if [[ "${MANUAL_DEPLOY_NETWORKING}" == "true" ]]; then
            networking=true
          fi

          echo "storage=${storage}" >> "$GITHUB_OUTPUT"
          echo "monitoring=${monitoring}" >> "$GITHUB_OUTPUT"
          echo "networking=${networking}" >> "$GITHUB_OUTPUT"

          {
            echo "### Deployment Targets"
            echo "- storage: ${storage}"
            echo "- monitoring: ${monitoring}"
            echo "- networking: ${networking}"
            echo
            echo "### Manual Overrides"
            echo "- force_deploy_all: ${FORCE_DEPLOY_ALL}"
            echo "- deploy_storage: ${MANUAL_DEPLOY_STORAGE}"
            echo "- deploy_monitoring: ${MANUAL_DEPLOY_MONITORING}"
            echo "- deploy_networking: ${MANUAL_DEPLOY_NETWORKING}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_storage:
    name: Deploy Storage
    if: github.event_name != 'pull_request' && needs.detect_changes.outputs.storage == 'true'
    needs:
      - validate
      - detect_changes
    runs-on:
      - self-hosted
      - linux
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed on the runner
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure SSH access
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64_SECRET: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_PRIVATE_KEY_B64_VAR: ${{ vars.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_SECRET:-}"
          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_VAR:-}"
          fi

          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            echo "Missing required GitHub secret or variable: SSH_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          touch "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload repository to the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-storage
        run: |
          set -euo pipefail

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.tmp \
            -czf - . \
          | ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; rm -rf '$REMOTE_DIR'; mkdir -p '$REMOTE_DIR'; tar -xzf - -C '$REMOTE_DIR'"

      - name: Deploy storage from the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-storage
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$REMOTE_DIR" "${KUBE_CONTEXT:-}" <<'EOF'
          set -euo pipefail

          REMOTE_DIR="$1"
          KUBE_CONTEXT="${2:-}"

          export PATH="$HOME/.local/bin:$PATH"
          export KUBECONFIG="${KUBECONFIG:-/etc/kubernetes/admin.conf}"

          cd "$REMOTE_DIR"
          ./scripts/install-helm.sh
          ./scripts/helm.sh deps storage

          if ! command -v kubectl >/dev/null 2>&1; then
            echo "kubectl is required on $HOSTNAME to deploy this repository." >&2
            exit 1
          fi

          if [[ ! -f "$KUBECONFIG" ]]; then
            echo "Expected kubeconfig at $KUBECONFIG on $HOSTNAME, but it was not found." >&2
            exit 1
          fi

          export KUBE_CONTEXT
          kubectl cluster-info >/dev/null
          ./scripts/helm.sh deploy storage
          EOF

      - name: Remove remote workspace
        if: always()
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-storage
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$REMOTE_DIR'"

  deploy_networking:
    name: Deploy Networking
    if: github.event_name != 'pull_request' && needs.detect_changes.outputs.networking == 'true'
    needs:
      - validate
      - detect_changes
    runs-on:
      - self-hosted
      - linux
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed on the runner
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure SSH access
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64_SECRET: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_PRIVATE_KEY_B64_VAR: ${{ vars.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_SECRET:-}"
          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_VAR:-}"
          fi

          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            echo "Missing required GitHub secret or variable: SSH_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          touch "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload repository to the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-networking
        run: |
          set -euo pipefail

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.tmp \
            -czf - . \
          | ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; rm -rf '$REMOTE_DIR'; mkdir -p '$REMOTE_DIR'; tar -xzf - -C '$REMOTE_DIR'"

      - name: Ensure Traefik dashboard auth secret exists
        shell: bash
        env:
          TRAEFIK_DASHBOARD_USERS: ${{ secrets.TRAEFIK_DASHBOARD_USERS }}
        run: |
          set -euo pipefail

          if [[ -z "${TRAEFIK_DASHBOARD_USERS:-}" ]]; then
            echo "Missing required GitHub secret: TRAEFIK_DASHBOARD_USERS" >&2
            exit 1
          fi

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'set -euo pipefail
             export KUBECONFIG="${KUBECONFIG:-/etc/kubernetes/admin.conf}"
             tmp_users_file="$(mktemp)"
             trap '\''rm -f "$tmp_users_file"'\'' EXIT
             cat > "$tmp_users_file"
             kubectl create namespace networking --dry-run=client -o yaml | kubectl apply -f -
             kubectl create secret generic traefik-dashboard-auth \
               --namespace networking \
               --from-file=users="$tmp_users_file" \
               --dry-run=client -o yaml | kubectl apply -f -' <<< "${TRAEFIK_DASHBOARD_USERS}"

      - name: Deploy networking from the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-networking
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$REMOTE_DIR" "${KUBE_CONTEXT:-}" <<'EOF'
          set -euo pipefail

          REMOTE_DIR="$1"
          KUBE_CONTEXT="${2:-}"

          export PATH="$HOME/.local/bin:$PATH"
          export KUBECONFIG="${KUBECONFIG:-/etc/kubernetes/admin.conf}"

          cd "$REMOTE_DIR"
          ./scripts/install-helm.sh
          ./scripts/helm.sh deps networking

          if ! command -v kubectl >/dev/null 2>&1; then
            echo "kubectl is required on $HOSTNAME to deploy this repository." >&2
            exit 1
          fi

          if [[ ! -f "$KUBECONFIG" ]]; then
            echo "Expected kubeconfig at $KUBECONFIG on $HOSTNAME, but it was not found." >&2
            exit 1
          fi

          export KUBE_CONTEXT
          kubectl cluster-info >/dev/null
          ./scripts/helm.sh deploy networking
          EOF

      - name: Remove remote workspace
        if: always()
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-networking
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$REMOTE_DIR'"

  deploy_monitoring:
    name: Deploy Monitoring
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.detect_changes.result == 'success' &&
      needs.validate.result == 'success' &&
      (needs.deploy_storage.result == 'success' || needs.deploy_storage.result == 'skipped') &&
      needs.detect_changes.outputs.monitoring == 'true'
    needs:
      - validate
      - detect_changes
      - deploy_storage
    runs-on:
      - self-hosted
      - linux
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed on the runner
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure SSH access
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64_SECRET: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_PRIVATE_KEY_B64_VAR: ${{ vars.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_SECRET:-}"
          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            SSH_PRIVATE_KEY_B64="${SSH_PRIVATE_KEY_B64_VAR:-}"
          fi

          if [[ -z "${SSH_PRIVATE_KEY_B64}" ]]; then
            echo "Missing required GitHub secret or variable: SSH_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          touch "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload repository to the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-monitoring
        run: |
          set -euo pipefail

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.tmp \
            -czf - . \
          | ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; rm -rf '$REMOTE_DIR'; mkdir -p '$REMOTE_DIR'; tar -xzf - -C '$REMOTE_DIR'"

      - name: Ensure Grafana SMTP secret exists
        shell: bash
        env:
          GRAFANA_SMTP_PASSWORD: ${{ secrets.GRAFANA_SMTP_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${GRAFANA_SMTP_PASSWORD:-}" ]]; then
            echo "Missing required GitHub secret: GRAFANA_SMTP_PASSWORD" >&2
            exit 1
          fi

          printf '%s' "${GRAFANA_SMTP_PASSWORD}" | tr -d '[:space:]' | ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'set -euo pipefail
             export KUBECONFIG="${KUBECONFIG:-/etc/kubernetes/admin.conf}"
             tmp_password_file="$(mktemp)"
             trap '\''rm -f "$tmp_password_file"'\'' EXIT
             cat > "$tmp_password_file"
             kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
             kubectl create secret generic grafana-smtp \
               --namespace monitoring \
               --from-literal=user=projectzero2795@gmail.com \
               --from-file=password="$tmp_password_file" \
               --dry-run=client -o yaml | kubectl apply -f -'

      - name: Deploy monitoring from the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-monitoring
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$REMOTE_DIR" "${KUBE_CONTEXT:-}" <<'EOF'
          set -euo pipefail

          REMOTE_DIR="$1"
          KUBE_CONTEXT="${2:-}"

          export PATH="$HOME/.local/bin:$PATH"
          export KUBECONFIG="${KUBECONFIG:-/etc/kubernetes/admin.conf}"

          cd "$REMOTE_DIR"
          ./scripts/install-helm.sh
          ./scripts/helm.sh deps monitoring

          if ! command -v kubectl >/dev/null 2>&1; then
            echo "kubectl is required on $HOSTNAME to deploy this repository." >&2
            exit 1
          fi

          if [[ ! -f "$KUBECONFIG" ]]; then
            echo "Expected kubeconfig at $KUBECONFIG on $HOSTNAME, but it was not found." >&2
            exit 1
          fi

          export KUBE_CONTEXT
          kubectl cluster-info >/dev/null
          ./scripts/helm.sh deploy monitoring
          EOF

      - name: Remove remote workspace
        if: always()
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}-monitoring
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$REMOTE_DIR'"
