name: Homelab Helm

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homelab-helm-production
  cancel-in-progress: false

env:
  DEPLOY_HOST: 10.11.11.31
  DEPLOY_PORT: "22"
  DEPLOY_USER: kubespray

jobs:
  validate:
    name: Validate Helm Charts
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate charts
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/helm.sh deps
          ./scripts/helm.sh lint
          ./scripts/helm.sh template

  deploy:
    name: Deploy To Kubernetes
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on:
      - self-hosted
      - linux
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Helm is installed on the runner
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/install-helm.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure SSH access
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [[ -z "${SSH_PRIVATE_KEY}" ]]; then
            echo "Missing required secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "${SSH_KNOWN_HOSTS}" ]]; then
            echo "Missing required secret: SSH_KNOWN_HOSTS" >&2
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload repository to the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}
        run: |
          set -euo pipefail

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.tmp \
            -czf - . \
          | ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; rm -rf '$REMOTE_DIR'; mkdir -p '$REMOTE_DIR'; tar -xzf - -C '$REMOTE_DIR'"

      - name: Deploy from the control-plane node
        shell: bash
        env:
          REMOTE_DIR: /tmp/homelab-helm/${{ github.run_id }}-${{ github.sha }}
          KUBE_CONTEXT: ${{ vars.KUBE_CONTEXT }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$REMOTE_DIR" "${KUBE_CONTEXT:-}" <<'EOF'
          set -euo pipefail

          REMOTE_DIR="$1"
          KUBE_CONTEXT="${2:-}"

          export PATH="$HOME/.local/bin:$PATH"

          cd "$REMOTE_DIR"
          ./scripts/install-helm.sh
          ./scripts/helm.sh deps

          if command -v kubectl >/dev/null 2>&1 && kubectl cluster-info >/dev/null 2>&1; then
            export KUBE_CONTEXT
            ./scripts/helm.sh deploy
            exit 0
          fi

          if ! command -v kubectl >/dev/null 2>&1; then
            echo "kubectl is required on $HOSTNAME to deploy this repository." >&2
            exit 1
          fi

          if sudo -n test -f /etc/kubernetes/admin.conf; then
            sudo -n env \
              "PATH=$PATH" \
              "KUBECONFIG=/etc/kubernetes/admin.conf" \
              "KUBE_CONTEXT=$KUBE_CONTEXT" \
              bash -lc "set -euo pipefail; cd '$REMOTE_DIR'; ./scripts/helm.sh deploy"
            exit 0
          fi

          echo "kubectl access failed for user $(whoami), and /etc/kubernetes/admin.conf is not accessible via sudo." >&2
          exit 1
          EOF
